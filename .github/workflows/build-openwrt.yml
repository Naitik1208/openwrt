name: Build Custom OpenWrt Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Maximize Disk Space Headroom
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune -a -f

    - name: Install Compilation Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget

    - name: Load Configuration Profile
      run: |
        # Check if the root-level .config exists and preserve it
        if [ -f .config ]; then
          echo "Found root-level .config profile."
        else
          touch .config
        fi
        sed -i 's/CONFIG_PACKAGE_linux-firmware=y/CONFIG_PACKAGE_linux-firmware=n/' .config
        echo "CONFIG_PACKAGE_linux-firmware=n" >> .config
        make defconfig

    - name: Compile Cross-Toolchain and Packages
      run: |
        make -j$(nproc) V=s || make -j1 V=s

    - name: Organize Completed Binaries
      run: |
        mkdir -p ./artifact/
        find bin/targets/mediatek/filogic/ -type f \( -name "*initramfs*" -o -name "*sysupgrade*" -o -name "*.bin" \) -exec cp {} ./artifact/ \;

    - name: Upload Firmware Binaries
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_Filogic_Firmware
        path: ./artifact/
